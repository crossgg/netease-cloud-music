# Scrobble 循环播放配置文件
# 使用方式: ncmctl scrobble --scrobble-config scrobble.example.yaml

# ============================================================
# 普通歌曲 ID 列表 (本地配置)
# 获取方式: 在网易云音乐网页/App中打开歌曲，URL中的数字即为 songId
# 例如: https://music.163.com/song?id=3366663042 → songId 为 3366663042
# ============================================================
songIds:
  - "3366663042"     # 替换为你想要播放的歌曲ID
  # - "1234567890"   # 可以添加更多歌曲ID

# ============================================================
# 云端歌曲列表 URL (从 GitHub 等远程地址获取 songId)
#
# 开启后会从该 URL 下载歌曲列表文件，文件格式为:
#   一行备注(以#开头) + 一行songId，交替排列
#
# 示例文件 songlist.txt 内容:
#   # 这是一首周杰伦的歌
#   3366663042
#   # 这是另一首示例歌曲
#   1234567890
#
# 将 songlist.txt 上传到你的 GitHub 仓库后，填入 raw 地址即可
# 远程获取的 songId 会与本地 songIds 合并一起播放
# 留空或注释掉则不启用远程获取
# ============================================================
remoteSongListUrl: ""
# remoteSongListUrl: "https://raw.githubusercontent.com/crosscc/netease-cloud-music/refs/heads/main/songlist.txt"

# ============================================================
# 每首歌的播放时长(秒)
#   0  = 使用歌曲实际时长 (推荐，最真实的模拟)
#   >0 = 自定义秒数 (例如 120 表示每首歌模拟播放120秒)
# ============================================================
duration: 0

# ============================================================
# 循环播放总次数
# 所有歌曲会循环播放，直到达到此次数
# 每天最多可刷 300 首 (服务端限制)
# ============================================================
count: 300
